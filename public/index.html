<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover, maximum-scale=1" />
<title>Dominion AI</title>
<meta name="theme-color" content="#000023" />
<meta name="apple-mobile-web-app-capable" content="yes" />
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
<meta name="apple-mobile-web-app-title" content="Dominion AI" />
<link rel="manifest" href="/manifest.webmanifest" />
<link rel="apple-touch-icon" href="/icon-180.png" />
<link rel="icon" href="/icon-192.png" />
<style>
  :root{
    --navy:#000023; --navy2:#0a1230; --copper:#c8762f; --copper2:#e8b07c;
    --sand:#e9dcc6; --muted:#8b93a7; --line:rgba(184,115,51,.28);
    --user:rgba(184,115,51,.22); --ai:rgba(255,255,255,.05); --glow:rgba(80,150,255,.45);
    /* panes = 5% glass, 1px neon green rims (Fred spec 2026-07-01) */
    --panel:rgba(7,12,34,.05);
    --glass:rgba(9,15,40,.05);
    --rim:rgba(57,255,20,.9);
    --rimglow:0 0 9px -2px rgba(57,255,20,.55);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
  html,body{margin:0;height:100%}
  body{
    background:#000018;
    color:var(--sand); font:16px/1.5 -apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,system-ui,sans-serif;
    display:flex; flex-direction:column; height:100dvh; overflow:hidden;
  }

  /* ---- photoreal circuit-board background video + frosted glass ---- */
  /* crystal clear: whole frame visible (no crop/zoom), fixed in place, nothing on top of it */
  #bgvideo{
    position:fixed; inset:0; width:100%; height:100%; object-fit:contain;
    z-index:-3; pointer-events:none; background:#000018;
  }
  /* overlay retired per Fred (2026-07-01): NOTHING obstructs the footage — no tint, no blur */
  #bgglass{display:none}
  @media(prefers-reduced-motion:reduce){ #bgvideo{display:none} }
  /* header = a detached glass slab floating above the footage */
  header{
    flex:none; display:flex; align-items:center; gap:8px;
    margin:calc(env(safe-area-inset-top) + 10px) 10px 4px;
    padding:8px 12px; border-radius:18px;
    background:var(--glass); border:1px solid var(--rim);
    -webkit-backdrop-filter:blur(8px) saturate(1.2); backdrop-filter:blur(8px) saturate(1.2);
    z-index:5;
    box-shadow:0 24px 46px -14px rgba(0,0,0,.9), var(--rimglow), inset 0 1px 0 rgba(255,255,255,.16);
  }
  .dot{width:18px;height:18px;border-radius:50%;flex:none;
    background:radial-gradient(circle at 35% 30%, #fff 0%, var(--copper2) 25%, var(--copper) 60%, #7a3f12 100%);
    box-shadow:0 0 12px var(--glow), 0 0 5px rgba(200,118,47,.7);}
  header .title{font-weight:600;letter-spacing:.3px}
  header .spacer{flex:1}
  select,button{font:inherit;color:var(--sand)}
  select{background:var(--navy2); border:1px solid var(--line); border-radius:9px; padding:6px 8px; max-width:38vw;}
  .ghost{background:transparent;border:1px solid var(--line);border-radius:9px;padding:6px 10px;color:var(--muted);cursor:pointer}
  .icon{background:transparent;border:none;color:var(--sand);font-size:22px;line-height:1;padding:4px 8px;cursor:pointer;border-radius:8px}
  .icon:active{background:rgba(255,255,255,.08)}

  /* ---- sidebar ---- */
  #overlay{position:fixed;inset:0;background:rgba(0,0,12,.55);backdrop-filter:blur(2px);z-index:8;opacity:0;pointer-events:none;transition:opacity .18s}
  #overlay.show{opacity:1;pointer-events:auto}
  #sidebar{
    position:fixed;top:0;left:0;height:100dvh;width:min(82vw,300px);z-index:9;display:flex;flex-direction:column;
    background:var(--panel);border-right:1px solid var(--rim);box-shadow:6px 0 26px rgba(0,0,0,.5);
    -webkit-backdrop-filter:blur(14px) saturate(1.2);backdrop-filter:blur(14px) saturate(1.2);
    transform:translateX(-102%);transition:transform .2s ease;padding-top:env(safe-area-inset-top);
  }
  #sidebar.open{transform:none}
  .sb-head{display:flex;align-items:center;gap:8px;padding:14px 12px 10px;border-bottom:1px solid var(--line)}
  .sb-head .h{font-weight:700;letter-spacing:.4px;color:var(--copper2);flex:1}
  .sb-new{background:linear-gradient(145deg,var(--copper),#7a3f12);border:none;border-radius:9px;padding:7px 11px;color:#fff1e0;cursor:pointer;font-size:14px}
  #chatlist{flex:1;overflow-y:auto;padding:8px}
  .ci{display:flex;align-items:center;gap:6px;padding:9px 10px;border-radius:10px;cursor:pointer;border:1px solid transparent}
  .ci:hover{background:rgba(255,255,255,.04)}
  .ci.active{background:rgba(184,115,51,.16);border-color:var(--line)}
  .ci .ttl{flex:1;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;font-size:14.5px}
  .ci .x{opacity:.45;font-size:15px;padding:0 4px}
  .ci .x:hover{opacity:1;color:#ff9a7a}
  .sb-foot{padding:10px 12px calc(10px + env(safe-area-inset-bottom));border-top:1px solid var(--line);color:var(--muted);font-size:12px}
  .sb-search{padding:8px 10px 0}
  .sb-search input{width:100%;background:var(--navy2);border:1px solid var(--line);border-radius:9px;padding:7px 10px;color:var(--sand);font:inherit;font-size:14px;outline:none}
  .sb-search input::placeholder{color:var(--muted)}
  .ci .meta{font-size:10.5px;color:var(--muted);white-space:nowrap}
  .msgmeta{font-size:10.5px;color:var(--muted);opacity:.7;padding:0 6px 2px}

  main{flex:1; overflow-y:auto; padding:14px 12px 6px; -webkit-overflow-scrolling:touch}
  .wrap{max-width:760px;margin:0 auto;display:flex;flex-direction:column;gap:6px}
  .turn{display:flex;flex-direction:column}
  .msg{display:flex}
  .msg.me{justify-content:flex-end}
  .bubble{max-width:92%;padding:12px 15px;border-radius:16px;white-space:pre-wrap;word-wrap:break-word;overflow-wrap:anywhere;
    font-size:17.5px;line-height:1.5;font-weight:600;color:#fff;
    text-shadow:0 1px 3px rgba(0,0,10,.8);
    -webkit-backdrop-filter:blur(6px) saturate(1.2); backdrop-filter:blur(6px) saturate(1.2);
    box-shadow:0 18px 36px -12px rgba(0,0,0,.85), inset 0 1px 0 rgba(255,255,255,.12);}
  .me .bubble{background:rgba(184,115,51,.05);border:1px solid var(--rim);color:#fff;border-bottom-right-radius:5px;
    box-shadow:0 18px 36px -12px rgba(0,0,0,.85), inset 0 1px 0 rgba(255,255,255,.14), var(--rimglow);}
  .ai .bubble{background:var(--glass);border:1px solid var(--rim);border-bottom-left-radius:5px;
    box-shadow:0 18px 36px -12px rgba(0,0,0,.85), inset 0 1px 0 rgba(255,255,255,.12), var(--rimglow);}
  .ai .bubble.think{color:var(--muted);font-style:italic}
  .acts{display:flex;gap:12px;padding:3px 6px 8px}
  .acts.me{justify-content:flex-end}
  .act{background:none;border:none;color:var(--muted);font-size:12px;cursor:pointer;padding:1px 2px;opacity:.65}
  .act:hover{opacity:1;color:var(--copper2)}
  .route{font-size:11px;color:var(--muted);opacity:.75;padding:1px 4px 3px}
  /* small text that sits directly on the footage needs a shadow to stay legible */
  .route,.msgmeta,.ctx,.act{text-shadow:0 1px 2px rgba(0,0,12,.75)}

  /* phone layout: the one-row header overflows at phone width and wraps raggedly ("off-kilter").
     Break it into two deliberate rows: brand row, then mode + panel buttons. */
  @media(max-width:560px){
    header{flex-wrap:wrap;gap:5px;row-gap:8px}
    header .spacer{flex-basis:100%;height:0}
    #mode{flex:1;max-width:none;min-width:0}
    .icon{font-size:19px;padding:4px 4px}
  }
  .tools{display:flex;flex-direction:column;gap:4px;margin:0 0 6px}
  .tool{font-size:12.5px;color:var(--copper2);opacity:.92;display:flex;align-items:center;gap:6px}
  .tool .sp{width:8px;height:8px;border-radius:50%;background:var(--copper2);box-shadow:0 0 8px var(--glow);animation:pulse 1s infinite}
  .tool.done .sp{background:#5fae6b;animation:none;box-shadow:none}
  .tool.gated{color:#e8b07c}
  @keyframes pulse{50%{opacity:.3}}
  .empty{margin:12vh auto 0;text-align:center;color:var(--muted);max-width:340px;
    padding:30px 26px;border-radius:22px;border:1px solid var(--rim);
    background:var(--glass);
    -webkit-backdrop-filter:blur(8px) saturate(1.2); backdrop-filter:blur(8px) saturate(1.2);
    box-shadow:0 30px 64px -18px rgba(0,0,0,.9), inset 0 1px 0 rgba(255,255,255,.14), var(--rimglow);}
  .empty .dot{margin:0 auto 14px;width:52px;height:52px}
  .empty .brand{margin:0;font-size:32px;font-weight:800;letter-spacing:.5px;color:var(--copper2);text-shadow:0 0 18px var(--glow)}
  .empty .byline{margin:8px 0 0;font-size:15px;letter-spacing:.4px;color:var(--sand);opacity:.85}
  .empty .hint{margin:14px 0 0;font-size:13px;opacity:.7}
  /* composer = its own floating glass slab, detached from the bottom edge */
  footer{
    flex:none; margin:4px 10px calc(10px + env(safe-area-inset-bottom));
    padding:8px 10px; border-radius:20px;
    background:var(--glass); border:1px solid var(--rim);
    -webkit-backdrop-filter:blur(8px) saturate(1.2); backdrop-filter:blur(8px) saturate(1.2);
    box-shadow:0 24px 46px -14px rgba(0,0,0,.9), var(--rimglow), inset 0 1px 0 rgba(255,255,255,.14);
  }
  .bar{max-width:760px;margin:0 auto;display:flex;gap:8px;align-items:flex-end}
  textarea{
    flex:1;resize:none;max-height:40vh;min-height:44px;padding:11px 13px;border-radius:14px;
    background:rgba(8,14,36,.35);border:1px solid var(--rim);color:var(--sand);outline:none;font:inherit;
  }
  textarea::placeholder{color:var(--muted)}
  .send{flex:none;width:44px;height:44px;border-radius:50%;border:none;cursor:pointer;
    background:linear-gradient(145deg,var(--copper),#7a3f12);color:#fff1e0;font-size:20px;box-shadow:0 6px 18px rgba(0,0,0,.45);}
  .send.stop{background:linear-gradient(145deg,#b23b2a,#5e1d13)}
  .send:disabled{opacity:.4}
  .err{color:#ff9a7a;font-size:13px;text-align:center;padding:6px}
  .cursor::after{content:"\258c";animation:blink 1s steps(2) infinite;color:var(--copper2)}
  @keyframes blink{50%{opacity:0}}

  /* ---- settings sheet ---- */
  .modal{position:fixed;inset:0;z-index:12;display:flex;align-items:flex-end;justify-content:center;background:rgba(0,0,12,.5);backdrop-filter:blur(3px)}
  .modal[hidden]{display:none}
  .sheet{width:min(560px,96vw);background:var(--panel);border:1px solid var(--rim);border-radius:16px 16px 0 0;
    -webkit-backdrop-filter:blur(14px) saturate(1.2);backdrop-filter:blur(14px) saturate(1.2);
    box-shadow:0 -20px 60px -20px rgba(0,0,0,.9), var(--rimglow);
    padding:16px 16px calc(16px + env(safe-area-inset-bottom));display:flex;flex-direction:column;gap:14px}
  @media(min-width:600px){.modal{align-items:center}.sheet{border-radius:16px}}
  .sheet-h{display:flex;align-items:center;font-weight:700;color:var(--copper2)}
  .sheet-h .icon{margin-left:auto}
  .frow{display:flex;flex-direction:column;gap:6px;font-size:14px;color:var(--muted)}
  .frow select,.sheet textarea{background:var(--navy2);border:1px solid var(--line);border-radius:9px;padding:8px;color:var(--sand);font:inherit}
  .sheet textarea{min-height:70px;resize:vertical}
  input[type=range]{accent-color:var(--copper);width:100%}

  /* ---- memory panel ---- */
  .ctx{font-size:11px;color:#7fa7ff;opacity:.85;padding:0 4px 4px}
  .mstats{font-size:12px;color:var(--muted);font-weight:400;margin-left:8px;flex:1}
  .mrow-add{display:flex;gap:8px;align-items:flex-end}
  .mrow-add textarea{flex:1;min-height:44px;background:var(--navy2);border:1px solid var(--line);border-radius:9px;padding:8px;color:var(--sand);font:inherit;resize:vertical}
  .mfilter{display:flex;gap:8px;align-items:center;font-size:13px;color:var(--muted)}
  .mlist{max-height:46vh;overflow-y:auto;display:flex;flex-direction:column;gap:8px}
  .mlist .none{color:var(--muted);font-size:13px;text-align:center;padding:16px}
  .mitem{border:1px solid var(--line);border-radius:10px;padding:8px 10px;background:var(--navy2);display:flex;flex-direction:column;gap:6px}
  .mitem .mtop{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
  .mbadge{border:1px solid var(--line);border-radius:6px;padding:1px 6px;font-size:10.5px;color:var(--copper2);text-transform:capitalize}
  .mbadge.pending{color:#e8b07c}
  .mbadge.rejected,.mbadge.archived{opacity:.55}
  .mitem .mc{font-size:14px;color:var(--sand);white-space:pre-wrap;word-wrap:break-word;overflow-wrap:anywhere}
  .mitem .macts{display:flex;gap:12px;flex-wrap:wrap}
  .mitem .macts .act{font-size:11.5px;opacity:.7}
  .mitem .pinned{color:#e8b07c}

  /* ---- tool activity + permission classes ---- */
  .tool .cls{font-size:9.5px;border:1px solid var(--line);border-radius:5px;padding:0 4px;opacity:.7;text-transform:uppercase;letter-spacing:.3px}
  .tool.blocked{color:#ff9a7a}.tool.failed{color:#ff9a7a}.tool.cancelled{color:var(--muted)}
  .confirm{border:1px solid var(--line);border-radius:10px;padding:8px 10px;margin:4px 0 6px;background:rgba(184,115,51,.10);font-size:13px;display:flex;flex-direction:column;gap:6px}
  .confirm .cq{color:var(--copper2)}
  .confirm .cbtns{display:flex;gap:8px}
  .confirm button{border:1px solid var(--line);border-radius:8px;padding:4px 12px;cursor:pointer;font-size:13px;background:var(--navy2);color:var(--sand)}
  .confirm button.yes{background:linear-gradient(145deg,var(--copper),#7a3f12);color:#fff1e0;border:none}
  .tritem{border:1px solid var(--line);border-radius:9px;padding:7px 9px;background:var(--navy2);display:flex;flex-direction:column;gap:3px}
  .tritem .trtop{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);flex-wrap:wrap}
  .tritem .trname{color:var(--sand);font-weight:600;font-size:13px}
  .tritem .trprev{font-size:12px;color:var(--muted);white-space:pre-wrap;word-break:break-word}
  .tbadge{border:1px solid var(--line);border-radius:5px;padding:0 5px;font-size:10px}
  .tbadge.dangerous{color:#ff9a7a}.tbadge.safe_local_write{color:#e8b07c}.tbadge.read_only{color:#7fa7ff}
  .tbadge.succeeded{color:#5fae6b}.tbadge.failed,.tbadge.blocked{color:#ff9a7a}.tbadge.cancelled{color:var(--muted)}
  .toggle{display:flex;align-items:center;gap:8px;font-size:14px;color:var(--muted)}

  /* ---- artifacts ---- */
  .aitem{border:1px solid var(--line);border-radius:10px;padding:8px 10px;background:var(--navy2);cursor:pointer;display:flex;flex-direction:column;gap:4px}
  .aitem .atop{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted)}
  .aitem .atitle{color:var(--sand);font-size:14px;font-weight:600}
  .back{cursor:pointer;color:var(--copper2);font-size:13px;align-self:flex-start;background:none;border:none;padding:2px 0}
  .arow{display:flex;gap:10px;align-items:center;flex-wrap:wrap;font-size:13px;color:var(--muted)}
  .arow select{padding:4px 6px}
  .acontent{white-space:pre-wrap;word-break:break-word;font-size:13px;background:var(--navy2);border:1px solid var(--line);border-radius:9px;padding:10px;max-height:36vh;overflow:auto}
  .areview{white-space:pre-wrap;font-size:12.5px;color:var(--copper2);border-left:2px solid var(--line);padding:6px 10px;max-height:24vh;overflow:auto}
  .adiff{white-space:pre;font-family:ui-monospace,Consolas,monospace;font-size:11.5px;background:#05091c;border:1px solid var(--line);border-radius:8px;padding:8px;max-height:32vh;overflow:auto;line-height:1.35}
  .adiff .add{color:#5fae6b}.adiff .del{color:#ff9a7a}
  .abadge{border:1px solid var(--line);border-radius:5px;padding:0 5px;font-size:10px;text-transform:capitalize}
  .abadge.final{color:#5fae6b}.abadge.reviewed{color:#7fa7ff}.abadge.draft{color:#e8b07c}.abadge.archived{opacity:.55}

  /* ---- mentor & improvement ---- */
  .itabs{display:flex;gap:6px;margin-bottom:8px}
  .itab{flex:1;padding:6px;border:1px solid var(--line);border-radius:8px;background:var(--navy2);color:var(--muted);cursor:pointer;font-size:13px;text-align:center}
  .itab.on{color:var(--copper2);border-color:var(--copper)}
  .critique{border:1px solid var(--line);border-radius:10px;padding:10px;background:rgba(57,130,255,.06);display:flex;flex-direction:column;gap:7px;font-size:13px;margin:4px 0 8px}
  .critique .crhead{display:flex;gap:8px;align-items:center;flex-wrap:wrap;color:var(--sand)}
  .scorepill{border:1px solid var(--line);border-radius:6px;padding:1px 7px;font-size:12px;color:var(--copper2)}
  .crsec{font-size:12.5px;color:var(--muted)}
  .crsec b{color:var(--sand);font-weight:600}
  .cand{display:flex;gap:8px;align-items:center;flex-wrap:wrap;font-size:12px;color:var(--muted);padding:2px 0;border-top:1px solid var(--line)}
  .cand button{font-size:11px;border:1px solid var(--line);border-radius:6px;background:var(--navy2);color:var(--copper2);padding:1px 7px;cursor:pointer}
  .cand button:disabled{opacity:.5}
</style>
</head>
<body>
  <video id="bgvideo" autoplay muted loop playsinline preload="auto" poster="/icon-512.png">
    <source src="/circuit-bg.mp4" type="video/mp4" />
  </video>
  <div id="bgglass" aria-hidden="true"></div>
  <div id="overlay"></div>
  <aside id="sidebar">
    <div class="sb-head">
      <span class="h">Chats</span>
      <button id="newchat" class="sb-new">+ New</button>
    </div>
    <div class="sb-search"><input id="chatsearch" type="search" placeholder="Search chats&#8230;" autocomplete="off" /></div>
    <div id="chatlist"></div>
    <div class="sb-foot">Dominion AI &middot; by Frederick Wolfe</div>
  </aside>

  <header>
    <button id="menu" class="icon" title="Chats" aria-label="Chats">&#9776;</button>
    <span class="dot" aria-hidden="true"></span>
    <span class="title">Dominion AI</span>
    <span class="spacer"></span>
    <select id="mode" aria-label="Mode" title="Mode">
      <option value="auto">Auto</option>
      <option value="fast">Fast</option>
      <option value="normal">Normal</option>
      <option value="deep_think">Deep Think</option>
      <option value="long_context">Long Context</option>
      <option value="draft">Draft</option>
      <option value="tool">Tool</option>
      <option value="mentor">Mentor</option>
    </select>
    <button id="artifacts" class="icon" title="Artifacts" aria-label="Artifacts">&#128196;</button>
    <button id="improve" class="icon" title="Mentor &amp; improvement" aria-label="Mentor and improvement">&#127891;</button>
    <button id="memory" class="icon" title="Memory" aria-label="Memory">&#129504;</button>
    <button id="tools" class="icon" title="Tool activity" aria-label="Tool activity">&#128295;</button>
    <button id="settings" class="icon" title="Settings" aria-label="Settings">&#9881;</button>
  </header>

  <main id="main"><div class="wrap" id="wrap">
    <div class="empty" id="empty">
      <span class="dot" aria-hidden="true"></span>
      <p class="brand">Dominion AI</p>
      <p class="byline">by Frederick Wolfe</p>
      <p class="hint">Ask me anything &mdash; I can also read your Command Deck, capture notes, read your files, and queue work.</p>
    </div>
  </div></main>

  <footer>
    <div class="bar">
      <textarea id="input" rows="1" placeholder="Message your assistant&#8230;" autocomplete="off"></textarea>
      <button id="send" class="send" title="Send" aria-label="Send">&#8593;</button>
    </div>
  </footer>

  <div id="smodal" class="modal" hidden>
    <div class="sheet">
      <div class="sheet-h">Settings <button id="sclose" class="icon" aria-label="Close">&times;</button></div>
      <label class="frow">Model (Auto = the router picks 8B vs 30B per request)
        <select id="model"><option value="auto">Auto (router picks)</option></select>
      </label>
      <label class="frow">Persona / style
        <select id="persona-sel">
          <option value="default">Default assistant</option>
          <option value="concise">Concise</option>
          <option value="brainstorm">Brainstorm partner</option>
          <option value="code">Coding helper</option>
          <option value="custom">Custom&#8230;</option>
        </select>
      </label>
      <textarea id="persona-custom" placeholder="Custom persona / system style&#8230;" hidden></textarea>
      <label class="frow">Creativity (temperature): <span id="temp-val">0.7</span>
        <input id="temp" type="range" min="0" max="1.2" step="0.1" value="0.7" />
      </label>
      <label class="toggle"><input type="checkbox" id="confirm-tools" /> Ask before risky tools (e.g. forge_send)</label>
      <label class="frow">Mentor privacy (external mentors only; local reviews never leave the box)
        <select id="privacy-sel">
          <option value="local_only">Local only — never send content out</option>
          <option value="redacted_external">Redacted — scrub secrets/PII first</option>
          <option value="approved_external">Approved — send as-is</option>
        </select>
      </label>
      <button id="ssave" class="sb-new">Save</button>
    </div>
  </div>

  <div id="mmodal" class="modal" hidden>
    <div class="sheet">

      <div class="itabs">
